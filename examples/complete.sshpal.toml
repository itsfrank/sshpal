ssh_target = "you@remote-host"
local_root = "/tmp/local-worktree" # optional (default: directory containing this config file)
remote_root = "/work/project"
rpc_port = 40001 # optional (default: 45678)
remote_bin_path = "~/bin/sshpal-run-custom" # optional (default: ~/.local/bin/sshpal-run)
sync_detection_timeout = "15s" # optional (default: 10s)

[tasks]
test = ["bin/test"]
lint = ["bin/lint", "--format", "json", "--strict"]
check = [["cargo", "fmt", "--check"], ["cargo", "test"]]

[tasks.build]
run = "cargo build --package '{#crate}'"
description = "Build one Cargo package"
cwd = "."
timeout = "10m"

[tasks.build.env]
RUST_BACKTRACE = "1"

[tasks.build.vars.crate]
description = "Cargo package name"
